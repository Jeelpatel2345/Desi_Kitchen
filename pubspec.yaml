name: desi_kitchen
description: A new Flutter project.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.5+1
  mobile_scanner: ^3.5.2

  # 🔥 Firebase


  firebase_core: ^2.30.0
  firebase_auth: ^4.17.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/icons/
    - assets/punjabi/
    - assets/gujarati/
    - assets/desert/
    - assets/drink/
    - assets/home/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icons/app_icon.png"